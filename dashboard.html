<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Moonleaf Dashboard</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>


<body>

<div class="levels">


<div class="level-card">

<p>Beginner</p>

</div>


<div class="level-card">
<h3>A2</h3>
<p>Elementary</p>

</div>


<div class="level-card">
<h3>B1</h3>
<p>Intermediate</p>
<button>Open</button>
</div>


<div class="level-card">
<h3>B2</h3>
<p>Upper Intermediate</p>
<button>Open</button>
</div>


<div class="level-card">
<h3>C1</h3>
<p>Advanced</p>
<button>Open</button>
</div>


<div class="level-card">
<h3>C2</h3>
<p>Mastery</p>
<button>Open</button>
</div>


</div>


<h3>🌸 Achievements</h3>

<p>🔒 Complete lessons to unlock achievements</p>


</div>

</section>

</html>
